#==============================================================================
#  T2 - Avaliacao de Aprendizagem
#  Modelo melhorado - Assistencia tecnica de computadores e celulares
#
#  Realidade simulada:
#  Q1 = Recepcao e triagem              Kendall: G/G/1/10
#  Q2 = Diagnostico tecnico             Kendall: G/G/1/8
#  Q3 = Manutencao/reparo               Kendall: G/G/3/15
#  Q4 = Teste final e retirada          Kendall: G/G/1/6
#
#  Melhorias aplicadas em Q3:
#  - Servidores: 2 -> 3
#  - Capacidade: 12 -> 15
#  - Atendimento: U(20, 40) -> U(18, 32)
#  - Retorno Q4 -> Q3: 0.25 -> 0.15
#
#  Probabilidades de saida do sistema:
#  - Q2: 0.10
#  - Q4: 0.85
#==============================================================================

!PARAMETERS

arrivals:
   Q1: 2.0

queues:
   Q1:
      servers: 1
      capacity: 10
      minArrival: 3.0
      maxArrival: 7.0
      minService: 2.0
      maxService: 5.0

   Q2:
      servers: 1
      capacity: 8
      minService: 8.0
      maxService: 15.0

   Q3:
      servers: 3
      capacity: 15
      minService: 18.0
      maxService: 32.0

   Q4:
      servers: 1
      capacity: 6
      minService: 5.0
      maxService: 12.0

network:
-  source: Q1
   target: Q2
   probability: 1.0

-  source: Q2
   target: Q3
   probability: 0.80

-  source: Q2
   target: Q1
   probability: 0.10

-  source: Q3
   target: Q4
   probability: 0.85

-  source: Q3
   target: Q2
   probability: 0.15

-  source: Q4
   target: Q3
   probability: 0.15

rndnumbersPerSeed: 100000

seeds:
- 42
